name: Build ZAuto VIP Production

on:
push:
branches:
- main

workflow_dispatch:

jobs:
build:
runs-on: ubuntu-22.04

```
steps:
  - name: Checkout Source
    uses: actions/checkout@v4

  - name: Set up Python
    uses: actions/setup-python@v5
    with:
      python-version: "3.11.4"

  - name: Set up Node.js
    uses: actions/setup-node@v4
    with:
      node-version: "20"

  - name: Download Node.js ARM Binaries
    run: |
      mkdir -p nodejs_backend/bin

      echo "Downloading ARM64 NodeJS..."
      curl -LO https://nodejs.org/dist/v20.11.1/node-v20.11.1-linux-arm64.tar.xz
      tar -xf node-v20.11.1-linux-arm64.tar.xz
      cp node-v20.11.1-linux-arm64/bin/node nodejs_backend/bin/node_arm64

      echo "Downloading ARMv7 NodeJS..."
      curl -LO https://unofficial-builds.nodejs.org/download/release/v20.11.1/node-v20.11.1-linux-armv7l.tar.xz
      tar -xf node-v20.11.1-linux-armv7l.tar.xz
      cp node-v20.11.1-linux-armv7l/bin/node nodejs_backend/bin/node_armv7

      chmod +x nodejs_backend/bin/node_arm64
      chmod +x nodejs_backend/bin/node_armv7

      rm -rf node-v20.11.1-linux-*

  - name: Install Node.js Dependencies
    run: |
      cd nodejs_backend
      npm install

  - name: Install Ubuntu Dependencies
    run: |
      sudo apt update

      sudo apt install -y \
        git \
        zip \
        unzip \
        openjdk-17-jdk \
        autoconf \
        libtool \
        pkg-config \
        zlib1g-dev \
        libncurses5-dev \
        libncursesw5-dev \
        libtinfo5 \
        cmake \
        libffi-dev \
        libssl-dev \
        build-essential \
        patch \
        libjpeg-dev \
        libpng-dev \
        ffmpeg \
        libsdl2-dev \
        libsdl2-image-dev \
        libsdl2-mixer-dev \
        libsdl2-ttf-dev \
        python3.11-venv \
        python3.11-dev

  - name: Install Build Tools
    run: |
      python -m pip install --upgrade pip==23.1.2

      pip install \
        setuptools==68.2.2 \
        wheel==0.41.2 \
        Cython==0.29.36

      pip install \
        buildozer==1.5.0 \
        python-for-android==2024.1.21 \
        virtualenv==20.24.5

  - name: Clean Old Build Cache
    run: |
      rm -rf .buildozer
      rm -rf bin

  - name: Build APK
    run: |
      buildozer android debug

  - name: Upload APK
    uses: actions/upload-artifact@v4
    with:
      name: ZAuto-VIP-APK
      path: bin/*.apk
```
