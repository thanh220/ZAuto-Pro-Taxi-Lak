name: Build ZAuto VIP Production

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      # 1. Tự động tải Node.js Binaries
      - name: Download Node.js Binaries
        run: |
          mkdir -p nodejs_backend/bin
          curl -LO https://nodejs.org/dist/v20.11.1/node-v20.11.1-linux-arm64.tar.xz
          tar -xf node-v20.11.1-linux-arm64.tar.xz
          cp node-v20.11.1-linux-arm64/bin/node nodejs_backend/bin/node_arm64
          curl -LO https://nodejs.org/dist/v20.11.1/node-v20.11.1-linux-armv7l.tar.xz
          tar -xf node-v20.11.1-linux-armv7l.tar.xz
          cp node-v20.11.1-linux-armv7l/bin/node nodejs_backend/bin/node_armv7
          rm -rf node-v20.11.1-linux-*

      # 2. Thiết lập Python
      - name: Set up Python 3.11.4
        uses: actions/setup-python@v5
        with:
          python-version: '3.11.4'

      # 3. Cài đặt Node.js
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      # 4. Cài đặt các thư viện API Zalo
      - name: Install Node.js Dependencies
        run: |
          cd nodejs_backend
          npm install

      # 5. Cài đặt các gói hệ thống cần thiết
      - name: Install System Dependencies
        run: |
          sudo apt update
          sudo apt install -y git zip unzip openjdk-17-jdk autoconf libtool pkg-config zlib1g-dev libncurses5-dev libncursesw5-dev libtinfo5 cmake libffi-dev libssl-dev build-essential patch libjpeg-dev libpng-dev ffmpeg libsdl2-dev libsdl2-image-dev libsdl2-mixer-dev libsdl2-ttf-dev

      # 6. Cấu hình môi trường build thông minh & CHỐNG XUNG ĐỘT PIP
      - name: Setup Build Environment with Auto-Optimization
        run: |
          echo "Đang quét môi trường..."
          PYTHON_VER=$(python -c 'import sys; print(f"{sys.version_info.major}.{sys.version_info.minor}")')
          echo "Phiên bản Python: $PYTHON_VER"
          
          # LUÔN KHÓA PIP Ở BẢN NÀY ĐỂ TRÁNH LỖI XUNG ĐỘT
          TARGET_PIP="23.1.2"
          echo "Phiên bản Pip bắt buộc: $TARGET_PIP"
          
          python -m pip install --upgrade pip==$TARGET_PIP
          pip install --upgrade setuptools==68.2.2 wheel==0.41.2 Cython==0.29.36
          pip install buildozer
          
          # Ép Buildozer không được dùng pip mới
          echo "VIRTUALENV_PIP=$TARGET_PIP" >> $GITHUB_ENV
          echo "PIP_DISABLE_PIP_VERSION_CHECK=1" >> $GITHUB_ENV
          echo "PIP_NO_CACHE_DIR=1" >> $GITHUB_ENV
          
          # Dọn dẹp cache môi trường cũ
          find . -name "venv" -type d -exec rm -rf {} +
          rm -rf .buildozer/android/platform/build-arm64-v8a_armeabi-v7a/build/venv

      # 7. Build APK
      - name: Build APK
        run: |
          buildozer android debug

      # 8. Upload APK
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: ZAuto-VIP-APK
          path: bin/*.apk
