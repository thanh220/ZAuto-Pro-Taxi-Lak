name: Build ZAuto VIP Production

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout Source
        uses: actions/checkout@v4

      - name: Cache Buildozer
        uses: actions/cache@v4
        with:
          path: |
            ~/.buildozer
            .buildozer
            ~/.gradle
          key: buildozer-zauto-${{ runner.os }}-${{ github.run_id }}
          restore-keys: |
            buildozer-zauto-${{ runner.os }}-

      - name: Cleanup System
        run: |
          sudo rm -rf /usr/share/dotnet /opt/ghc "/usr/local/share/boost" "$AGENT_TOOLSDIRECTORY"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"   # ← SỬA: bỏ .4, lấy latest 3.11.x

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Download Node.js ARM Binaries
        run: |
          mkdir -p nodejs_backend/bin/arm64-v8a
          mkdir -p nodejs_backend/bin/armeabi-v7a
          curl -LO https://nodejs.org/dist/v20.11.1/node-v20.11.1-linux-arm64.tar.xz
          tar -xf node-v20.11.1-linux-arm64.tar.xz
          cp node-v20.11.1-linux-arm64/bin/node nodejs_backend/bin/arm64-v8a/libnode.so
          curl -LO https://nodejs.org/dist/v20.11.1/node-v20.11.1-linux-armv7l.tar.xz
          tar -xf node-v20.11.1-linux-armv7l.tar.xz
          cp node-v20.11.1-linux-armv7l/bin/node nodejs_backend/bin/armeabi-v7a/libnode.so
          chmod +x nodejs_backend/bin/arm64-v8a/libnode.so
          chmod +x nodejs_backend/bin/armeabi-v7a/libnode.so
          rm -rf node-v20.11.1-linux-*

      - name: Install Node.js Dependencies
        run: |
          cd nodejs_backend
          npm install

      - name: Install Ubuntu Dependencies
        run: |
          sudo apt update
          sudo apt install -y \
            git zip unzip openjdk-17-jdk \
            autoconf automake libtool pkg-config \
            zlib1g-dev libncurses5-dev libncursesw5-dev libtinfo5 \
            cmake libffi-dev libssl-dev build-essential patch \
            libjpeg-dev libpng-dev ffmpeg \
            libsdl2-dev libsdl2-image-dev libsdl2-mixer-dev libsdl2-ttf-dev \
            python3.11-venv python3.11-dev

      - name: Set JAVA_HOME
        run: |
          echo "JAVA_HOME=/usr/lib/jvm/java-17-openjdk-amd64" >> $GITHUB_ENV
          echo "/usr/lib/jvm/java-17-openjdk-amd64/bin" >> $GITHUB_PATH

      - name: Install Build Tools
        run: |
          # Nâng pip host lên bản sạch trước
          python -m pip install --upgrade pip
          # Pin buildozer + p4a version ổn định
          pip install Cython==0.29.36 buildozer==1.5.0 "python-for-android==2024.1.21" virtualenv setuptools wheel

      - name: Create required directories
        run: |
          mkdir -p java res/xml
          if [ ! -f res/xml/file_paths.xml ] && [ -f file_paths.xml ]; then
            cp file_paths.xml res/xml/file_paths.xml
          fi

      - name: Generate Keystore
        run: |
          if [ ! -f zauto.keystore ]; then
            keytool -genkey -v \
              -keystore zauto.keystore \
              -alias zauto \
              -keyalg RSA -keysize 2048 -validity 10000 \
              -dname "CN=ZAuto, OU=VIP, O=Thien, L=DakLak, ST=VN, C=VN" \
              -storepass zauto123 \
              -keypass zauto123
          fi

      - name: Build APK (Release)
        run: |
          mkdir -p ~/.android && touch ~/.android/repositories.cfg
          yes | buildozer android p4a --accept-sdk-license || true

          export P4A_RELEASE_KEYSTORE=$(pwd)/zauto.keystore
          export P4A_RELEASE_KEYSTORE_PASSWD=zauto123
          export P4A_RELEASE_KEYALIAS_PASSWD=zauto123
          export P4A_RELEASE_KEYALIAS=zauto
          export GRADLE_OPTS="-Xmx4096m -Dorg.gradle.daemon=false"
          export PIP_NO_BUILD_ISOLATION=1   # ← THÊM MỚI

          buildozer -v android release

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: ZAuto-VIP-Release-APK
          path: bin/*.apk
