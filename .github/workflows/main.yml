name: Build ZAuto VIP Production

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      # 1. Tự động tải Node.js Binaries (Giải quyết vấn đề file nặng)
      - name: Download Node.js Binaries
        run: |
          mkdir -p nodejs_backend/bin
          # Tải bản ARM64
          curl -LO https://nodejs.org/dist/v20.11.1/node-v20.11.1-linux-arm64.tar.xz
          tar -xf node-v20.11.1-linux-arm64.tar.xz
          cp node-v20.11.1-linux-arm64/bin/node nodejs_backend/bin/node_arm64
          
          # Tải bản ARMv7
          curl -LO https://nodejs.org/dist/v20.11.1/node-v20.11.1-linux-armv7l.tar.xz
          tar -xf node-v20.11.1-linux-armv7l.tar.xz
          cp node-v20.11.1-linux-armv7l/bin/node nodejs_backend/bin/node_armv7
          
          # Dọn dẹp file tạm
          rm -rf node-v20.11.1-linux-*

      # 2. Thiết lập Python
      - name: Set up Python 3.11.4
        uses: actions/setup-python@v5
        with:
          python-version: '3.11.4'

      # 3. Cài đặt Node.js để Build API Zalo
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      # 4. Tải các thư viện API Zalo (npm install)
      - name: Install Node.js Dependencies
        run: |
          cd nodejs_backend
          npm install

      - name: Install System Dependencies
        run: |
          sudo apt update
          sudo apt install -y git zip unzip openjdk-17-jdk autoconf libtool pkg-config zlib1g-dev libncurses5-dev libncursesw5-dev libtinfo5 cmake libffi-dev libssl-dev build-essential patch libjpeg-dev libpng-dev ffmpeg libsdl2-dev libsdl2-image-dev libsdl2-mixer-dev libsdl2-ttf-dev

      - name: Setup Build Environment
        run: |
          # 1. Cài đặt các công cụ cơ bản
          python -m pip install --upgrade pip==23.1.2
          pip install --upgrade setuptools==68.2.2 wheel==0.41.2 Cython==0.29.36
          pip install buildozer
          
          # 2. NGĂN CHẶN XUNG ĐỘT PIP (Cải tiến quan trọng)
          echo "PIP_DISABLE_PIP_VERSION_CHECK=1" >> $GITHUB_ENV
          echo "PIP_NO_CACHE_DIR=1" >> $GITHUB_ENV
          echo "VIRTUALENV_PIP=23.1.2" >> $GITHUB_ENV
          
          # 3. Xóa sạch venv cũ để Buildozer tạo mới hoàn toàn
          # Dùng lệnh find để xóa cho chắc chắn
          find . -name "venv" -type d -exec rm -rf {} +
          rm -rf .buildozer/android/platform/build-arm64-v8a_armeabi-v7a/build/venv
      - name: Build APK
        run: |
          # Dùng debug hoặc release tùy bạn
          buildozer android debug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: ZAuto-VIP-APK
          path: bin/*.apk
