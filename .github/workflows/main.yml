name: Build ZAuto VIP Production

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout Source
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11.4"

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Download Node.js ARM Binaries
        run: |
          mkdir -p nodejs_backend/bin
          echo "Downloading ARM64 NodeJS..."
          curl -LO https://nodejs.org/dist/v20.11.1/node-v20.11.1-linux-arm64.tar.xz
          tar -xf node-v20.11.1-linux-arm64.tar.xz
          cp node-v20.11.1-linux-arm64/bin/node nodejs_backend/bin/node_arm64
          echo "Downloading ARMv7 NodeJS..."
          curl -LO https://unofficial-builds.nodejs.org/download/release/v20.11.1/node-v20.11.1-linux-armv7l.tar.xz
          tar -xf node-v20.11.1-linux-armv7l.tar.xz
          cp node-v20.11.1-linux-armv7l/bin/node nodejs_backend/bin/node_armv7
          chmod +x nodejs_backend/bin/node_arm64
          chmod +x nodejs_backend/bin/node_armv7
          rm -rf node-v20.11.1-linux-*

      - name: Install Node.js Dependencies
        run: |
          cd nodejs_backend
          npm install

      - name: Install Ubuntu Dependencies
        run: |
          sudo apt update
          sudo apt install -y \
            git zip unzip openjdk-17-jdk \
            autoconf libtool pkg-config \
            zlib1g-dev libncurses5-dev libncursesw5-dev libtinfo5 \
            cmake libffi-dev libssl-dev build-essential patch \
            libjpeg-dev libpng-dev ffmpeg \
            libsdl2-dev libsdl2-image-dev libsdl2-mixer-dev libsdl2-ttf-dev \
            python3.11-venv python3.11-dev

      # FIX 4: Đặt JAVA_HOME trỏ đúng Java 17
      - name: Set JAVA_HOME
        run: |
          echo "JAVA_HOME=/usr/lib/jvm/temurin-17-jdk-amd64" >> $GITHUB_ENV
          echo "/usr/lib/jvm/temurin-17-jdk-amd64/bin" >> $GITHUB_PATH

      - name: Install Build Tools
        run: |
          # FIX 1: Dùng python -m pip install pip==23.1.2 (không dùng --upgrade)
          python -m pip install pip==23.1.2
          pip install \
            setuptools==68.2.2 \
            wheel==0.41.2 \
            Cython==0.29.36
          # FIX 5: Dùng python-for-android==2023.09.16 khớp với p4a.branch
          pip install \
            buildozer==1.5.0 \
            python-for-android==2023.09.16 \
            virtualenv==20.24.5

      - name: Create required directories
        run: |
          # Bổ sung tạo thư mục trước khi build
          mkdir -p java res/xml
          if [ ! -f res/xml/file_paths.xml ] && [ -f file_paths.xml ]; then
            cp file_paths.xml res/xml/file_paths.xml
          fi

      - name: Clean Old Build Cache & Venv
        run: |
          # FIX 3: Xóa trực tiếp thư mục thay vì dùng lệnh find
          rm -rf .buildozer bin venv .venv env

      - name: Build APK (Pass 1 - Fetch p4a)
        run: |
          # FIX 2 (Pass 1): Chạy buildozer để tải p4a về trước khi patch
          buildozer android p4a -- --version || true

      - name: Apply p4a Patch
        run: |
          # FIX 2 (Pass 2): Áp dụng file patch của bạn tại đây
          # Ví dụ: patch -p1 -d .buildozer/android/platform/python-for-android < path/to/your/fix.patch
          echo "Ready to apply patch to p4a source."

      - name: Build APK (Final)
        run: |
          buildozer android debug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: ZAuto-VIP-APK
          path: bin/*.apk
