name: Build ZAuto VIP Production

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    env:
      PYTHON_VERSION: "3.11"
      JAVA_VERSION: "17"

    steps:
      - name: Checkout Source
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Cache Gradle & Pip
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
            ~/.cache/pip
            ~/.buildozer/android/platform/android-ndk-r25b
            ~/.buildozer/android/platform/android-sdk
          key: ${{ runner.os }}-zauto-v58-${{ hashFiles('buildozer.spec') }}
          restore-keys: |
            ${{ runner.os }}-zauto-v58-

      - name: Install System Packages
        run: |
          sudo apt update
          sudo apt install -y \
            zip unzip git openjdk-17-jdk \
            autoconf automake libtool pkg-config \
            zlib1g-dev libncurses5-dev libncursesw5-dev \
            libtinfo5 cmake libffi-dev libssl-dev ccache \
            build-essential patch libjpeg-dev libpng-dev \
            ffmpeg libsdl2-dev libsdl2-image-dev \
            libsdl2-mixer-dev libsdl2-ttf-dev

      - name: Install Python Packages
        run: |
          # BẮT BUỘC: Hạ cấp pip về 23.1.2 (bản cuối cùng còn file RequirementInformation)
          python -m pip install --upgrade "pip==23.1.2"
          pip install "setuptools==68.2.2" "wheel==0.41.2" "Cython==0.29.36" "virtualenv==20.21.0"
          
          # BẮT BUỘC: Cài lõi python-for-android bản vá lỗi mới nhất từ Github
          pip install https://github.com/kivy/python-for-android/archive/master.zip
          pip install https://github.com/kivy/buildozer/archive/master.zip

      - name: Prepare Android Environment
        run: |
          mkdir -p ~/.android
          touch ~/.android/repositories.cfg

      - name: Clean Local Workspace
        run: |
          rm -rf bin
          rm -rf ~/.buildozer
          find . -name "venv" -type d -exec rm -rf {} +
          find /home/runner/work -name "venv" -type d -exec rm -rf {} +

      - name: Ensure res/xml/file_paths.xml exists
        run: |
          mkdir -p res/xml
          if [ ! -f "res/xml/file_paths.xml" ]; then
            echo '<?xml version="1.0" encoding="utf-8"?><paths><files-path name="apk_files" path="." /></paths>' > res/xml/file_paths.xml
          fi
      - name: Setup Keystore
        run: |
          # Kiểm tra file đã tồn tại trong repo chưa
          if [ -f "zauto.keystore" ]; then
            echo "Keystore found, proceeding..."
          else
            echo "::error::File zauto.keystore không tồn tại trong repo!"
            exit 1
          fi
      - name: Validate Project
        run: |
          echo "========== PYTHON CHECK =========="
          find . -type f -name "*.py" \
            -not -path "*/\.buildozer/*" \
            -not -path "*/bin/*" \
            -exec python -m py_compile {} \;

          echo "========== REQUIRED FILES =========="
          FILES=(
            "main.py"
            "buildozer.spec"
            "manifest_services.xml"
            "java/org/zauto/ZaloForegroundService.java"
            "java/org/zauto/ZaloWebManager.java"
          )

          for FILE in "${FILES[@]}"; do
            if [ ! -f "$FILE" ]; then
              echo "::error::Missing file: $FILE"
              exit 1
            fi
          done

      - name: Build APK
        run: |
          export PATH=$PATH:~/.local/bin
          export GRADLE_OPTS="-Xmx4096m -Dorg.gradle.daemon=false"
          
          # Ép môi trường ảo bên trong buildozer không được tự ý nâng cấp pip
          export VIRTUALENV_PIP=23.1.2
          
          buildozer android debug 2>&1 | tee build_full.log
          if [ ${PIPESTATUS[0]} -ne 0 ]; then
            echo "====== TÓM TẮT LỖI ======"
            grep -i "error\|exception\|failed\|traceback" build_full.log | tail -50
            exit 1
          fi
      - name: Verify APK
        run: |
          echo "========== APK OUTPUT =========="
          ls -lah bin/
          APK_COUNT=$(find bin -name "*.apk" | wc -l)

          if [ "$APK_COUNT" -eq "0" ]; then
            echo "::error::APK NOT FOUND!"
            exit 1
          fi

      - name: Create GitHub Release
        if: github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ github.run_number }}
          name: "ZAuto VIP v${{ github.run_number }}"
          body: "Build tự động - Phiên bản mới nhất"
          files: bin/*.apk
          make_latest: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
